# Plantilla usada como referencia: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-elasticloadbalancingv2-loadbalancer.html
# Plantilla usada como referencia: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-elasticloadbalancingv2-targetgroup.html
# Plantilla usada como referencia: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-ec2-launchtemplate.html
# Plantilla usada como referencia: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-elasticloadbalancingv2-listener.html
# Plantilla usada como referencia: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-autoscaling-autoscalinggroup.html
# Plantilla usada como referencia: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-lambda-function.html

AWSTemplateFormatVersion: '2010-09-09'
Description: Stack de capa de aplicacion de Penguin On The Way! (ALB, ASG, SNS, Lambda para notificaciones por email)

Parameters:
  EnvironmentName:
    Type: String
    Description: Nombre del entorno (prefijo de recursos)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se desplego la capa de aplicacion

  PublicSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets publicas para el ALB

  PrivateAppSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets privadas para EC2 y Lambda

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group del ALB

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group de EC2

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group de RDS importado desde stack de datos

  RDSEndpoint:
    Type: String
    Description: Endpoint de RDS importado desde el stack de datos

  RDSDatabase:
    Type: String
    Description: Nombre de la base de datos a usar en RDS
    Default: mydb

  DBUsername:
    Type: String
    Description: Usuario de la base de datos
    Default: admin

  DBPassword:
    Type: String
    Description: Contraseña de la base de datos
    NoEcho: true

  AMIId:
    Type: AWS::EC2::Image::Id
    Description: AMI customizada para las EC2 de la capa de aplicacion

Resources:

  # Application Load Balancer
  AppALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-ALB"
      Scheme: internet-facing
      Subnets: !Ref PublicSubnets
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Type: application

  # Target Group para EC2
  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-TG"
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30

  # Listener del ALB
  AppListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  # Launch Template para Auto Scaling
  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${EnvironmentName}-LaunchTemplate"
      LaunchTemplateData:
        InstanceType: t3.micro
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        IamInstanceProfile:
          Name: LabInstanceProfile
        ImageId: !Ref AMIId
        # KeyName: my-keypair
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y

  # Auto Scaling Group
  AppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref PrivateAppSubnets
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 2
      TargetGroupARNs:
        - !Ref AppTargetGroup
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-EC2"
          PropagateAtLaunch: true
        

  # Política de escalado por tráfico del ALB
  ALBRequestScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AppAutoScalingGroup
      PolicyType: TargetTrackingScaling
      Cooldown: 300
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          ResourceLabel: !Join 
            - "/"
            - - !GetAtt AppALB.LoadBalancerFullName
              - !GetAtt AppTargetGroup.TargetGroupFullName
        TargetValue: 50.0   # 50 requests por instancia como objetivo


Outputs:

  ALBArn:
    Description: ARN del ALB
    Value: !Ref AppALB

  AutoScalingGroupName:
    Description: Nombre del Auto Scaling Group
    Value: !Ref AppAutoScalingGroup